name: stroom
description: A Flutter app combining FlClash UI architecture with camera functionality.
publish_to: "none"
version: 0.4.32

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # FlClash Architecture Dependencies
  flutter_riverpod: ^3.3.2
  dynamic_color: ^1.8.1
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Camera/Photo Functionality Dependencies
  image_picker: ^1.2.3
  path_provider: ^2.1.6
  path: ^1.9.1

  # TTS Functionality Dependencies
  dio: ^5.10.0
  shared_preferences: ^2.5.5
  file_picker: ^11.0.2
  permission_handler: ^12.0.3
  just_audio: ^0.10.6
  uuid: ^4.5.3
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_native_event_loop: ^1.0.9
  media_kit_libs_video: ^1.0.7
  crypto: ^3.0.7
  cross_platform_video_thumbnails: ^0.1.1
  mime: ^2.0.0
  sqflite: ^2.4.3
  audio_waveforms: ^2.0.2

  # Chat UI
  flutter_chat_ui: ^2.11.1
  flutter_chat_core: ^2.9.0
  markdown_widget: ^2.3.2+8
  flutter_highlight: ^0.7.0

  flutter_inappwebview: ^6.1.5

  # Image Editor
  pro_image_editor: ^13.0.0

  # Extended Image Viewer (replaces InteractiveViewer + custom Image.memory)
  extended_image: ^10.0.1

  # SVG support
  flutter_svg: ^2.3.0

  # Photo View for SVG gesture handling
  photo_view: ^0.15.0

  # UI and Utilities
  cupertino_icons: ^1.0.9
  material_color_utilities: ^0.13.0
  idb_shim: ^2.9.6+1
  archive: ^4.0.9
  url_launcher: ^6.3.2
  flutter_background_service: ^5.1.0
  flutter_background_service_android: ^6.3.1
  flutter_local_notifications: ^22.0.1
  flutter_math_fork: ^0.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.15.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  generate: true
