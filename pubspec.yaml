name: stroom
description: A Flutter app combining FlClash UI architecture with camera functionality.
publish_to: "none"
version: 0.2.14

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # FlClash Architecture Dependencies
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  freezed_annotation: ^3.1.0
  dynamic_color: ^1.0.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Camera/Photo Functionality Dependencies
  camera: ^0.10.5+2
  image_picker: ^1.1.0
  path_provider: ^2.1.0
  path: ^1.8.3
  flutter_image_compress: ^2.3.0

  # TTS Functionality Dependencies
  dio: ^5.4.0+1
  shared_preferences: ^2.2.2
  file_picker: ^11.0.2
  permission_handler: ^12.0.1
  audio_session: ^0.1.12
  just_audio: ^0.9.36
  uuid: ^4.3.0
  video_player: ^2.9.1
  video_thumbnail: ^0.5.3
  crypto: ^3.0.3
  mime: ^1.0.4
  file: ^6.1.4
  share_plus: ^7.2.0
  sqflite: ^2.3.0
  record: ^6.0.0

  # Chat UI
  flutter_chat_ui: ^2.11.1
  flutter_chat_core: ^2.9.0
  markdown_widget: ^2.3.2+8
  flutter_highlight: ^0.7.0

  flutter_inappwebview: ^6.0.0

  # UI and Utilities
  chewie: ^1.8.1
  cupertino_icons: ^1.0.6
  material_color_utilities: ^0.13.0
  idb_shim: ^2.9.0
  archive: ^3.6.1
  url_launcher: ^6.2.0
  flutter_background_service: ^5.0.0
  flutter_background_service_android: ^6.0.0
  flutter_math_fork: ^0.7.4

  # FFmpeg for cross-platform audio/video processing (Android/iOS/macOS/Windows)
  ffmpeg_kit_flutter_new: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  freezed: ^3.1.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/ffmpeg/

  generate: true
