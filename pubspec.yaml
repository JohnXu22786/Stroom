name: stroom
description: A Flutter app combining FlClash UI architecture with camera functionality.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # FlClash Architecture Dependencies
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  freezed_annotation: ^2.4.0
  dynamic_color: ^1.0.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Camera/Photo Functionality Dependencies
  camera: ^0.10.5+2
  image_picker: ^1.1.0
  path_provider: ^2.1.0
  path: ^1.8.3

  # TTS Functionality Dependencies
  dio: ^5.4.0+1
  shared_preferences: ^2.2.2
  file_picker: ^11.0.2
  permission_handler: ^12.0.1
  audio_session: ^0.1.12
  just_audio: ^0.9.36
  uuid: ^4.3.0
  mime: ^1.0.4
  file: ^6.1.4
  share_plus: ^7.2.0

  # UI and Utilities
  cupertino_icons: ^1.0.6
  material_color_utilities: ^0.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  freezed: ^2.4.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  generate: true
