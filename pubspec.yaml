name: stroom
description: A Flutter app combining FlClash UI architecture with camera functionality.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # FlClash Architecture Dependencies
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  freezed_annotation: ^2.4.0
  dynamic_color: ^1.0.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Camera/Photo Functionality Dependencies
  camera: ^0.10.5+2
  image_picker: ^1.1.0
  path_provider: ^2.1.0
  path: ^1.8.3

  # Audio Recording/Playback Dependencies
  just_audio: ^0.10.5
  audio_session: ^0.1.15
  flutter_tts: ^3.8.4

  # UI and Utilities
  cupertino_icons: ^1.0.6
  material_color_utilities: ^0.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  freezed: ^2.4.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  generate: true
