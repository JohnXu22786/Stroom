name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      - uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*') }}
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14"
      - run: flutter pub get
      - name: Create dummy keystore for build
        run: keytool -genkey -v -keystore android/upload-keystore.jks -alias upload -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=CI, OU=Build, O=Stroom, L=Unknown, ST=Unknown, C=XX"
      - run: flutter build apk --release --split-per-abi
      - name: Rename APKs
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p artifacts
          for apk in build/app/outputs/flutter-apk/*.apk; do
            name=$(basename "$apk")
            arch=$(echo "$name" | sed -E 's/app-(.*)-release\.apk/\1/')
            mv "$apk" "artifacts/stroom-android-$arch-release-$TAG.apk"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: artifacts/*.apk

  build-windows:
    name: Build Windows (InstallShield 安装包)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Install InstallShield
        shell: pwsh
        run: |
          # InstallShield 安装说明：
          # 1. 需要在 runner 上预装 InstallShield（或使用自托管 runner）
          # 2. 或者通过以下方式下载安装：
          #    Invoke-WebRequest -Uri "$env:INSTALLSHIELD_URL" -OutFile "$env:TEMP\InstallShield.exe"
          #    Start-Process "$env:TEMP\InstallShield.exe" -ArgumentList '/S /v/qn' -Wait
          # 默认路径检查
          $IS_PATHS = @(
            "C:\Program Files (x86)\InstallShield\2023\System\IsCmdBld.exe",
            "C:\Program Files (x86)\InstallShield\2024\System\IsCmdBld.exe",
            "C:\Program Files (x86)\InstallShield\2025\System\IsCmdBld.exe",
            "C:\Program Files (x86)\InstallShield\2026\System\IsCmdBld.exe"
          )
          $found = $false
          foreach ($path in $IS_PATHS) {
            if (Test-Path $path) {
              echo "FOUND_IS=$path" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              echo "Found InstallShield at: $path"
              $found = $true
              break
            }
          }
          if (-not $found) {
            echo "InstallShield not found — checking for alternative paths…"
            # 尝试自动发现
            $alt = Get-ChildItem "C:\Program Files (x86)\InstallShield" -Filter "IsCmdBld.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($alt) {
              echo "FOUND_IS=$($alt.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              echo "Found InstallShield at: $($alt.FullName)"
              $found = $true
            }
          }
          if (-not $found) {
            echo "WARNING: InstallShield not found on this runner."
            echo "The Windows installer will NOT be built."
            echo "To fix: pre-install InstallShield on the runner or use a self-hosted runner."
            echo "SKIP_INSTALLER=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
      - name: Build InstallShield installer
        shell: pwsh
        run: |
          $TAG = "$env:GITHUB_REF_NAME"
          $version = $TAG -replace '^v', ''
          mkdir artifacts -Force

          if ($env:SKIP_INSTALLER -eq "true") {
            echo "Skipping InstallShield build (InstallShield not installed)."
            exit 0
          }

          $isCmdBld = $env:FOUND_IS
          if (-not $isCmdBld) {
            echo "ERROR: InstallShield path not found."
            exit 1
          }

          # 用 tag 版本替换 installer.ism 中的版本号（写入临时文件，不修改源文件）
          $ismContent = (Get-Content "windows\installer.ism" -Raw)
          $oldVersion = '<property name="ProductVersion" value="1.0.0"'
          $newVersion = '<property name="ProductVersion" value="' + $version + '"'
          $ismContent = $ismContent.Replace($oldVersion, $newVersion)
          $ismContent | Set-Content "windows\installer.tmp.ism" -Encoding utf8

          echo "Building InstallShield installer for version $version…"
          & "$isCmdBld" -p "windows\installer.tmp.ism" -a "Stroom" -b "Release"
          $exitCode = $LASTEXITCODE

          # 清理临时文件
          Remove-Item "windows\installer.tmp.ism" -ErrorAction SilentlyContinue

          if ($exitCode -ne 0) {
            echo "::error::InstallShield build failed with exit code $exitCode"
            exit $exitCode
          }

          # 验证安装包已生成
          $installer = Get-ChildItem -Path "artifacts" -Filter "*.exe" -Recurse | Select-Object -First 1
          if (-not $installer) {
            echo "::error::InstallShield did not produce an installer .exe"
            exit 1
          }
          echo "InstallShield installer ready: $($installer.Name)"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: artifacts/**

  build-macos:
    name: Build macOS (DMG + ZIP)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      - run: flutter create --platforms=macos .
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Package artifacts
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p artifacts
          APP="build/macos/Build/Products/Release/Stroom.app"
          # ZIP 包（zip-based update fallback）
          cd build/macos/Build/Products/Release
          zip -r "$OLDPWD/artifacts/stroom-macos-arm64-release-$TAG.zip" "Stroom.app"
          cd "$OLDPWD"
          # DMG 安装包（macOS 标准格式）
          hdiutil create -volname "Stroom" \
            -srcfolder "$APP" \
            -ov -format UDZO \
            "artifacts/stroom-macos-arm64-release-$TAG.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: artifacts/*

  build-linux:
    name: Build Linux (ZIP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libmpv-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Package artifacts
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p artifacts
          cd build/linux/x64/release/bundle
          zip -r "$OLDPWD/artifacts/stroom-linux-x64-release-$TAG.zip" .
          cd "$OLDPWD"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: artifacts/*

  build-ios:
    name: Build iOS IPA (unsigned)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      - run: flutter create --platforms=ios .
      - run: flutter pub get
      - name: Configure CocoaPods
        run: |
          pod repo add trunk https://github.com/CocoaPods/Specs.git 2>/dev/null || true
      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign
      - name: Create unsigned IPA (Payload/Runner.app → zip)
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p artifacts
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r "$OLDPWD/artifacts/stroom-ios-unsigned-$TAG.ipa" Payload/
          cd "$OLDPWD"
      - uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: artifacts/*

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-windows, build-macos, build-linux, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*-build'
          merge-multiple: true
      - name: Display structure
        run: ls -la
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            *.apk
            *.ipa
            *.exe
            *.dmg
            *.zip
          generate_release_notes: true
