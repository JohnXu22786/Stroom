name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      - uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*') }}
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14"
      - run: flutter pub get
      - name: Create dummy keystore for build
        run: keytool -genkey -v -keystore android/upload-keystore.jks -alias upload -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=CI, OU=Build, O=Stroom, L=Unknown, ST=Unknown, C=XX"
      - run: flutter build apk --release
      - name: Rename APK
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p artifacts
          mv build/app/outputs/flutter-apk/app-release.apk "artifacts/stroom-android-release-$TAG.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: artifacts/*.apk

  build-windows:
    name: Build Windows (安装包)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Create installer
        shell: pwsh
        run: |
          $TAG = "$env:GITHUB_REF_NAME"
          $version = $TAG -replace '^v', ''
          # 把 tag 版本写入 installer.iss
          (Get-Content "windows\installer.iss") -replace '0\.2\.14', $version | Set-Content "windows\installer.iss"
          # 安装 Inno Setup
          choco install innosetup --no-progress -y
          # 编译安装包
          mkdir artifacts -Force
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "windows\installer.iss"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: artifacts/*

  build-macos:
    name: Build macOS (DMG + ZIP)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      - run: flutter create --platforms=macos .
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Package artifacts
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p artifacts
          APP="build/macos/Build/Products/Release/Stroom.app"
          # ZIP 包（zip-based update fallback）
          cd build/macos/Build/Products/Release
          zip -r "$OLDPWD/artifacts/stroom-macos-arm64-release-$TAG.zip" "Stroom.app"
          cd "$OLDPWD"
          # DMG 安装包（macOS 标准格式）
          hdiutil create -volname "Stroom" \
            -srcfolder "$APP" \
            -ov -format UDZO \
            "artifacts/stroom-macos-arm64-release-$TAG.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: artifacts/*

  build-linux:
    name: Build Linux (ZIP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libmpv-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Package artifacts
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p artifacts
          cd build/linux/x64/release/bundle
          zip -r "$OLDPWD/artifacts/stroom-linux-x64-release-$TAG.zip" .
          cd "$OLDPWD"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: artifacts/*

  build-ios:
    name: Build iOS IPA (unsigned)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      - run: flutter create --platforms=ios .
      - run: flutter pub get
      - name: Configure CocoaPods
        run: |
          pod repo add trunk https://github.com/CocoaPods/Specs.git 2>/dev/null || true
      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign
      - name: Create unsigned IPA (Payload/Runner.app → zip)
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p artifacts
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r "$OLDPWD/artifacts/stroom-ios-unsigned-$TAG.ipa" Payload/
          cd "$OLDPWD"
      - uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: artifacts/*

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-windows, build-macos, build-linux, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*-build'
          merge-multiple: true
      - name: Display structure
        run: ls -la
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            *.apk
            *.ipa
            *.exe
            *.dmg
            *.zip
          generate_release_notes: true
