name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      - run: flutter create --platforms=android .
      - run: flutter pub get
      - name: Copy Gradle init script for jcenter() compatibility
        run: mkdir -p ~/.gradle/init.d && cp android/gradle-init-scripts/plugin-repos.gradle ~/.gradle/init.d/
      - name: Create dummy keystore for build
        run: keytool -genkey -v -keystore android/upload-keystore.jks -alias upload -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=CI, OU=Build, O=Stroom, L=Unknown, ST=Unknown, C=XX"
      - run: flutter build apk --release --split-per-abi
      - name: Rename APKs
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p artifacts
          for apk in build/app/outputs/flutter-apk/*.apk; do
            name=$(basename "$apk")
            arch=$(echo "$name" | sed -E 's/app-(.*)-release\.apk/\1/')
            mv "$apk" "artifacts/stroom-android-$arch-release-$TAG.apk"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: artifacts/*.apk

  build-windows:
    name: Build Windows (安装包 + ZIP)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Create installer
        shell: pwsh
        run: |
          $TAG = "$env:GITHUB_REF_NAME"
          $version = $TAG -replace '^v', ''
          # 把 tag 版本写入 installer.iss
          (Get-Content "windows\installer.iss") -replace '0\.2\.14', $version | Set-Content "windows\installer.iss"
          # 安装 Inno Setup
          choco install innosetup --no-progress -y
          # 编译安装包
          mkdir artifacts -Force
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "windows\installer.iss"
      - name: Package ZIP (fallback)
        shell: pwsh
        run: |
          $TAG = "$env:GITHUB_REF_NAME"
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "artifacts\stroom-windows-x64-release-$TAG.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: artifacts/*

  build-macos:
    name: Build macOS (DMG + ZIP)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      - run: flutter create --platforms=macos .
      - run: flutter pub get
      - name: Remove discontinued ffmpeg_kit pod from macOS
        run: |
          # ffmpeg_kit_flutter_min_gpl's CocoaPods dependency
          # ffmpeg-kit-macos-min-gpl:6.0 is no longer available.
          # Remove it from .flutter-plugins-dependencies to skip CocoaPods install.
          python3 -c "import json,pathlib;f=pathlib.Path('.flutter-plugins-dependencies');d=json.loads(f.read_text());p=d.get('plugins',{}).get('macos',[]);d['plugins']['macos']=[x for x in p if 'ffmpeg_kit_flutter_min_gpl' not in x.get('name','')];f.write_text(json.dumps(d,indent=2));print('removed ffmpeg_kit_flutter_min_gpl from macos plugins')"
      - run: flutter build macos --release
      - name: Package artifacts
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p artifacts
          APP="build/macos/Build/Products/Release/Stroom.app"
          # ZIP 包（zip-based update fallback）
          cd build/macos/Build/Products/Release
          zip -r "$OLDPWD/artifacts/stroom-macos-arm64-release-$TAG.zip" "Stroom.app"
          cd "$OLDPWD"
          # DMG 安装包（macOS 标准格式）
          hdiutil create -volname "Stroom" \
            -srcfolder "$APP" \
            -ov -format UDZO \
            "artifacts/stroom-macos-arm64-release-$TAG.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: artifacts/*

  build-linux:
    name: Build Linux (ZIP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Package artifacts
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p artifacts
          cd build/linux/x64/release/bundle
          zip -r "$OLDPWD/artifacts/stroom-linux-x64-release-$TAG.zip" .
          cd "$OLDPWD"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: artifacts/*

  build-ios:
    name: Build iOS (IPA, unsigned)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - name: Package IPA (unsigned)
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p artifacts
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/
          zip -r "$OLDPWD/artifacts/stroom-ios-release-$TAG.ipa" Payload/
      - uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: artifacts/*

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-windows, build-macos, build-linux, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*-build'
          merge-multiple: true
      - name: Display structure
        run: ls -la
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            *.apk
            *.exe
            *.dmg
            *.ipa
            *.zip
          generate_release_notes: true
