name: Release Build

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  TAG: ${{ github.event.release.tag_name || github.ref_name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-version:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.extract-version.outputs.app_version }}
    steps:
      - id: extract-version
        run: |
          TAG="${{ env.TAG }}"
          # Strip leading 'v' if present: v1.2.3 -> 1.2.3
          VERSION="${TAG#v}"
          echo "app_version=$VERSION" >> $GITHUB_OUTPUT

  windows:
    needs: prepare-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release --dart-define=APP_VERSION=${{ needs.prepare-version.outputs.app_version }}
      - name: Create Windows archive
        shell: pwsh
        run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "stroom-windows-x64-release-$env:TAG.zip"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: stroom-windows-x64-release-*.zip



  macos:
    needs: prepare-version
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter create --platforms=macos .
      - run: flutter pub get
      - name: Configure CocoaPods
        run: |
          pod repo add trunk https://github.com/CocoaPods/Specs.git 2>/dev/null || true
      - run: flutter build macos --release --universal --dart-define=APP_VERSION=${{ needs.prepare-version.outputs.app_version }}
      - name: Create macOS archive
        shell: bash
        run: |
          cd build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/stroom-macos-release-$TAG.zip" .
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: stroom-macos-release-*.zip

  linux:
    needs: prepare-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - run: flutter create --platforms=linux .
      - run: flutter pub get
      - run: flutter build linux --release --dart-define=APP_VERSION=${{ needs.prepare-version.outputs.app_version }}
      - name: Create Linux archive
        run: |
          cd build/linux/x64/release/bundle
          zip -r "$GITHUB_WORKSPACE/stroom-linux-x64-release-$TAG.zip" .
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: stroom-linux-x64-release-*.zip

  web:
    needs: prepare-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build web --release --dart-define=APP_VERSION=${{ needs.prepare-version.outputs.app_version }}
      - name: Create Web archive
        run: |
          cd build/web
          zip -r "$GITHUB_WORKSPACE/stroom-web-release-$TAG.zip" .
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: stroom-web-release-*.zip

  android:
    needs: prepare-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ runner.os }}
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14"
      - run: flutter pub get
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE }}" | base64 -d > ${{ runner.temp }}/keystore.jks
      - name: Build APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release --dart-define=APP_VERSION=${{ needs.prepare-version.outputs.app_version }}
      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk "stroom-android-release-$TAG.apk"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: stroom-android-release-*.apk
