name: Release Build

on:
  release:
    types: [published]

env:
  TAG: ${{ github.event.release.tag_name || github.ref_name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Create Windows archive
        shell: pwsh
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath "stroom-windows-release-$env:TAG.zip"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: stroom-windows-release-*.zip



  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build web --release
      - name: Create Web archive
        run: |
          cd build/web
          zip -r "$GITHUB_WORKSPACE/stroom-web-release-$TAG.zip" .
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: stroom-web-release-*.zip

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk "stroom-android-release-$TAG.apk"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: stroom-android-release-*.apk
