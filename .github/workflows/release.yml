name: Release Build

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  TAG: ${{ github.event.release.tag_name || github.ref_name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-version:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.extract-version.outputs.app_version }}
    steps:
      - id: extract-version
        run: |
          TAG="${{ env.TAG }}"
          # Strip leading 'v' if present: v1.2.3 -> 1.2.3
          VERSION="${TAG#v}"
          echo "app_version=$VERSION" >> $GITHUB_OUTPUT

  windows:
    needs: prepare-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release --dart-define=APP_VERSION=${{ needs.prepare-version.outputs.app_version }}
      - name: Build InstallShield installer
        shell: pwsh
        run: |
          $TAG = "${{ env.TAG }}"
          $version = $TAG -replace '^v', ''

          # 查找 InstallShield
          $IS_PATHS = @(
            "C:\Program Files (x86)\InstallShield\2023\System\IsCmdBld.exe",
            "C:\Program Files (x86)\InstallShield\2024\System\IsCmdBld.exe",
            "C:\Program Files (x86)\InstallShield\2025\System\IsCmdBld.exe",
            "C:\Program Files (x86)\InstallShield\2026\System\IsCmdBld.exe"
          )
          $isCmdBld = $null
          foreach ($path in $IS_PATHS) {
            if (Test-Path $path) {
              $isCmdBld = $path
              break
            }
          }
          if (-not $isCmdBld) {
            $alt = Get-ChildItem "C:\Program Files (x86)\InstallShield" -Filter "IsCmdBld.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($alt) { $isCmdBld = $alt.FullName }
          }

          if (-not $isCmdBld) {
            Write-Host "::warning::InstallShield not found on this runner. Windows installer cannot be built."
            exit 1
          }

          # 替换版本号（写入临时文件）
          mkdir artifacts -Force
          $ismContent = (Get-Content "windows\installer.ism" -Raw)
          $oldVersion = '<property name="ProductVersion" value="1.0.0"'
          $newVersion = '<property name="ProductVersion" value="' + $version + '"'
          $ismContent = $ismContent.Replace($oldVersion, $newVersion)
          $ismContent | Set-Content "windows\installer.tmp.ism" -Encoding utf8

          Write-Host "Building InstallShield installer for version $version…"
          & "$isCmdBld" -p "windows\installer.tmp.ism" -a "Stroom" -b "Release"
          $exitCode = $LASTEXITCODE

          # 清理临时文件
          Remove-Item "windows\installer.tmp.ism" -ErrorAction SilentlyContinue

          if ($exitCode -ne 0) {
            Write-Host "::error::InstallShield build failed with exit code $exitCode"
            exit $exitCode
          }

          # 查找生成的安装包
          $installer = Get-ChildItem -Path "artifacts" -Filter "*.exe" -Recurse | Select-Object -First 1
          if ($installer) {
            Copy-Item $installer.FullName -Destination "$env:GITHUB_WORKSPACE/stroom-windows-x64-installer-$TAG.exe"
            Write-Host "Installer ready: stroom-windows-x64-installer-$TAG.exe"
          } else {
            Write-Host "::error::InstallShield did not produce an installer .exe"
            exit 1
          }
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: stroom-windows-x64-installer-*.exe



  macos:
    needs: prepare-version
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter create --platforms=macos .
      - run: flutter pub get
      - name: Configure CocoaPods
        run: |
          pod repo add trunk https://github.com/CocoaPods/Specs.git 2>/dev/null || true
      - run: flutter build macos --release --dart-define=APP_VERSION=${{ needs.prepare-version.outputs.app_version }}
      - name: Create macOS archive
        shell: bash
        run: |
          cd build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/stroom-macos-release-$TAG.zip" .
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: stroom-macos-release-*.zip

  linux:
    needs: prepare-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libmpv-dev
      - run: flutter create --platforms=linux .
      - run: flutter pub get
      - run: flutter build linux --release --dart-define=APP_VERSION=${{ needs.prepare-version.outputs.app_version }}
      - name: Create Linux archive
        run: |
          cd build/linux/x64/release/bundle
          zip -r "$GITHUB_WORKSPACE/stroom-linux-x64-release-$TAG.zip" .
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: stroom-linux-x64-release-*.zip

  web:
    needs: prepare-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build web --release --dart-define=APP_VERSION=${{ needs.prepare-version.outputs.app_version }}
      - name: Create Web archive
        run: |
          cd build/web
          zip -r "$GITHUB_WORKSPACE/stroom-web-release-$TAG.zip" .
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: stroom-web-release-*.zip

  ios:
    needs: prepare-version
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter create --platforms=ios .
      - run: flutter pub get
      - name: Configure CocoaPods
        run: |
          pod repo add trunk https://github.com/CocoaPods/Specs.git 2>/dev/null || true
      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign --dart-define=APP_VERSION=${{ needs.prepare-version.outputs.app_version }}
      - name: Create unsigned IPA (Payload/Runner.app → zip)
        run: |
          TAG="${{ env.TAG }}"
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r "$GITHUB_WORKSPACE/stroom-ios-unsigned-$TAG.ipa" Payload/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: stroom-ios-unsigned-*.ipa

  android:
    needs: prepare-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ runner.os }}
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14"
      - run: flutter pub get
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE }}" | base64 -d > ${{ runner.temp }}/keystore.jks
      - name: Build APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release --dart-define=APP_VERSION=${{ needs.prepare-version.outputs.app_version }}
      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk "stroom-android-release-$TAG.apk"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: stroom-android-release-*.apk
