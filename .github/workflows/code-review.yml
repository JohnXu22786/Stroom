name: Automated Code Review

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  code-review:
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Please review this pull request and provide feedback on:
            - Code quality and Dart/Flutter best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage — are there adequate tests for the changes?

            PR number: ${{ github.event.number }}
            Repo: ${{ github.repository }}

            Be constructive and helpful in your feedback. Focus on substantive issues rather than style preferences.

            Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.

          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
