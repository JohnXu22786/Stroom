name: Nightly Build

on:
  workflow_dispatch:
  schedule:
    - cron: "0 17 * * *" # 01:00 Beijing Time (UTC+8)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  actions: write

jobs:
  # ── Full Test Suite + Coverage ───────────────────────────────────────────
  coverage:
    name: Full Test Suite + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          pub-cache: true
      - run: flutter pub get
      - name: Run all tests with coverage
        run: flutter test --coverage
      - name: Install lcov
        run: sudo apt-get install -y lcov
      - name: Generate HTML coverage report
        run: genhtml coverage/lcov.info -o coverage/html
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/html

  # ── E2E Tests ────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          pub-cache: true
      - run: flutter pub get
      - name: Install xvfb for headless display
        run: sudo apt-get install -y xvfb
      - name: Run integration tests
        run: |
          mkdir -p test-reports
          xvfb-run flutter test -d linux integration_test/ --reporter expanded 2>&1 | tee test-reports/integration-test.log
      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: test-reports/
          retention-days: 7

  # ── Linux Build ──────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          pub-cache: true
      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libmpv-dev
      - run: flutter create --platforms=linux .
      - run: flutter pub get
      - run: flutter build linux --release

  # ── Web Build ────────────────────────────────────────────────────────────
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          pub-cache: true
      - run: flutter pub get
      - run: flutter build web --release

  # ── Android Build ────────────────────────────────────────────────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          pub-cache: true
      - uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*') }}
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14"
      - run: flutter pub get
      - name: Create dummy keystore for CI
        run: keytool -genkey -v -keystore android/upload-keystore.jks -alias upload -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=CI, OU=Build, O=Stroom, L=Unknown, ST=Unknown, C=XX"
      - run: flutter build apk --release

  # ── Windows Build ────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          pub-cache: true
      - run: flutter pub get
      - run: flutter build windows --release

  # ── macOS ARM64 Build ─────────────────────────────────────────────────────
  # Uses macos-15 (Apple Silicon ARM64). Builds native arm64 binary.
  build-macos-arm64:
    name: Build macOS ARM64
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          pub-cache: true
      - run: flutter create --platforms=macos .
      - run: flutter pub get
      - name: Clean SwiftPM cache
        run: |
          rm -rf ~/Library/Caches/org.swift.swiftpm
          rm -rf ~/Library/Developer/Xcode/DerivedData
      - name: Configure CocoaPods
        run: |
          pod repo add trunk https://github.com/CocoaPods/Specs.git 2>/dev/null || true
      - name: Build macOS ARM64
        run: flutter build macos --release
        env:
          FLUTTER_XCODE_ARCHS: arm64

  # ── macOS x64 Build ───────────────────────────────────────────────────────
  # GitHub no longer provides Intel (x86_64) macOS runners (macos-13 removed).
  # All macOS runners are now Apple Silicon (ARM64).
  # x86_64 is cross-compiled on ARM64 via Xcode's cross-compilation support.
  # This is the same approach Flutter uses for universal builds.
  build-macos-x64:
    name: Build macOS x64
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          pub-cache: true
      - run: flutter create --platforms=macos .
      - run: flutter pub get
      - name: Clean SwiftPM cache
        run: |
          rm -rf ~/Library/Caches/org.swift.swiftpm
          rm -rf ~/Library/Developer/Xcode/DerivedData
      - name: Configure CocoaPods
        run: |
          pod repo add trunk https://github.com/CocoaPods/Specs.git 2>/dev/null || true
      - name: Build macOS x64
        run: flutter build macos --release
        env:
          FLUTTER_XCODE_ARCHS: x86_64

  # ── iOS Build ────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          pub-cache: true
      - run: flutter create --platforms=ios .
      - run: flutter pub get
      - name: Clean SwiftPM cache
        run: |
          rm -rf ~/Library/Caches/org.swift.swiftpm
          rm -rf ~/Library/Developer/Xcode/DerivedData
      - name: Configure CocoaPods
        run: |
          pod repo add trunk https://github.com/CocoaPods/Specs.git 2>/dev/null || true
      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign
