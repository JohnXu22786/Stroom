name: CI Checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Format Check ──────────────────────────────────────────────────────────
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Check Dart formatting
        run: dart format --set-exit-if-changed .

  # ── Static Analysis ───────────────────────────────────────────────────────
  analyze:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Run Dart analyzer
        run: flutter analyze --no-fatal-warnings --no-fatal-infos
      - name: Check changed files have tests
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if [ -z "$BASE_SHA" ]; then
            echo "Not a PR — skipping diff coverage check."
            exit 0
          fi
          echo "### Changed lib/ files vs test/ coverage ###"
          echo ""
          UNCOVERED=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            test_f="test/${file#lib/}"
            test_f="${test_f%.dart}_test.dart"
            if [ -f "$test_f" ]; then
              echo "  ✅ $file"
            else
              echo "  ⚠️  $file → missing $test_f"
              UNCOVERED=1
            fi
          done < <(git diff --name-only "$BASE_SHA" -- 'lib/**/*.dart')
          echo ""
          if [ "$UNCOVERED" -eq 0 ]; then
            echo "All changed files have matching tests. (But check that existing tests cover new logic.)"
          else
            echo "Some changed files lack dedicated test files. Add them or verify coverage via existing tests."
          fi

  # ── Test Suite (parallel groups) ──────────────────────────────────────────
  test:
    name: Tests (${{ matrix.label }})
    runs-on: ubuntu-latest
    needs: [format, analyze]
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Core
            pattern: test/*_test.dart
          - label: Widgets
            pattern: test/widgets
          - label: Pages
            pattern: test/pages
          - label: Providers
            pattern: test/providers
          - label: Services
            pattern: test/services
          - label: Utils
            pattern: test/utils
          - label: Models
            pattern: test/models
          - label: Startup
            pattern: test/startup
          - label: CatCatch
            pattern: test/catcatch
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Run ${{ matrix.label }} tests
        run: flutter test ${{ matrix.pattern }}
