name: CI Checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Format Check ──────────────────────────────────────────────────────────
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Check Dart formatting
        run: dart format --set-exit-if-changed .

  # ── Static Analysis ───────────────────────────────────────────────────────
  analyze:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Run Dart analyzer
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

  # ── Test Suite (parallel groups) ──────────────────────────────────────────
  test:
    name: Tests (${{ matrix.label }})
    runs-on: ubuntu-latest
    needs: [analyze]
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Core
            pattern: test/*_test.dart
          - label: Widgets
            pattern: test/widgets
          - label: Pages
            pattern: test/pages
          - label: Providers
            pattern: test/providers
          - label: Services
            pattern: test/services
          - label: Utils
            pattern: test/utils
          - label: Models
            pattern: test/models
          - label: Startup
            pattern: test/startup
          - label: CatCatch
            pattern: test/catcatch
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Run ${{ matrix.label }} tests
        run: flutter test ${{ matrix.pattern }}
