name: CI Checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Run Dart analyzer
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: [analyze]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - run: flutter create --platforms=linux .
      - run: flutter pub get
      - run: flutter build linux --release

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [analyze]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build web --release

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [analyze]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*') }}
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14"
      - run: flutter create --platforms=android .
      - run: flutter pub get
      # JitPack repository is configured directly in android/settings.gradle.kts
      # under pluginManagement.repositories — no init script needed.
      - name: Create dummy keystore for CI
        run: keytool -genkey -v -keystore android/upload-keystore.jks -alias upload -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=CI, OU=Build, O=Stroom, L=Unknown, ST=Unknown, C=XX"
      - run: flutter build apk --release

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [analyze]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release

  build-macos:
    name: Build macOS
    runs-on: macos-15
    needs: [analyze]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter create --platforms=macos .
      - run: flutter pub get
      - name: Remove discontinued ffmpeg_kit pod from macOS
        run: |
          # Modify Podfile to remove ffmpeg CocoaPods dependencies before install
          python3 -c "import json,pathlib;f=pathlib.Path('.flutter-plugins-dependencies');d=json.loads(f.read_text());p=d.get('plugins',{}).get('macos',[]);d['plugins']['macos']=[x for x in p if 'ffmpeg_kit_flutter_min_gpl' not in x.get('name','')];p=d.get('plugins',{}).get('ios',[]);d['plugins']['ios']=[x for x in p if 'ffmpeg_kit_flutter_min_gpl' not in x.get('name','')];f.write_text(json.dumps(d,indent=2))"
          rm -rf macos/Flutter/ephemeral
          sed -i '' 's/^end$/pre_install do |installer|\n  installer.pod_targets.delete_if { |p| p.name.include?("ffmpeg") }\nend\n\nend/' macos/Podfile
          flutter build macos --release --no-pub

  build-ios:
    name: Build iOS (unsigned)
    runs-on: macos-15
    needs: [analyze]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter create --platforms=ios .
      - run: flutter pub get
      - name: Remove discontinued ffmpeg_kit pod from iOS
        run: |
          # Modify Podfile to remove ffmpeg CocoaPods dependencies before install
          python3 -c "import json,pathlib;f=pathlib.Path('.flutter-plugins-dependencies');d=json.loads(f.read_text());p=d.get('plugins',{}).get('ios',[]);d['plugins']['ios']=[x for x in p if 'ffmpeg_kit_flutter_min_gpl' not in x.get('name','')];p=d.get('plugins',{}).get('macos',[]);d['plugins']['macos']=[x for x in p if 'ffmpeg_kit_flutter_min_gpl' not in x.get('name','')];f.write_text(json.dumps(d,indent=2))"
          rm -rf ios/Flutter/ephemeral
          sed -i '' 's/^end$/pre_install do |installer|\n  installer.pod_targets.delete_if { |p| p.name.include?("ffmpeg") }\nend\n\nend/' ios/Podfile
          flutter build ios --release --no-codesign --no-pub
