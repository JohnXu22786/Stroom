name: CI Checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Run Dart analyzer
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: [analyze]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - run: flutter create --platforms=linux .
      - run: flutter pub get
      - run: flutter build linux --release

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [analyze]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build web --release

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [analyze]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*') }}
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14"
      - run: flutter pub get
      - name: Copy Gradle init script for jcenter() compatibility
        run: |
          mkdir -p ~/.gradle/init.d
          cp android/gradle-init-scripts/plugin-repos.gradle ~/.gradle/init.d/
      - name: Create dummy keystore for CI
        run: keytool -genkey -v -keystore android/upload-keystore.jks -alias upload -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=CI, OU=Build, O=Stroom, L=Unknown, ST=Unknown, C=XX"
      - run: flutter build apk --release

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [analyze]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release

  build-macos:
    name: Build macOS
    runs-on: macos-15
    needs: [analyze]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter create --platforms=macos .
      - run: flutter pub get
      - name: Configure CocoaPods
        run: |
          pod repo add trunk https://github.com/CocoaPods/Specs.git 2>/dev/null || true
      - run: flutter build macos --release
